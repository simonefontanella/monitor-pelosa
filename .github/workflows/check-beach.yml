name: Controllo spiaggia La Pelosa

on:
  schedule:
    # Ogni 5 minuti (minimo consentito da GitHub). Puoi mettere */10 o */15.
    - cron: '*/5 * * * *'
  workflow_dispatch:   # permette anche l'avvio manuale dalla tab "Actions"

# Necessario per ricommittare state.json (evita avvisi duplicati)
permissions:
  contents: write

# Evita che due esecuzioni si sovrappongano e vadano in conflitto sul push
concurrency:
  group: beach-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Controllo disponibilità
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          # --- personalizza qui sotto ---
          WATCH_DATES: ''      # es '15/07/2026,16/07/2026' | vuoto = tutte le date
          MIN_SPOTS: '1'       # posti minimi per far scattare l'avviso
        run: python beach_monitor.py --once

      - name: Salva lo stato (per non ripetere gli avvisi)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --staged --quiet; then
            echo "Nessun cambiamento di stato."
          else
            git commit -m "chore: aggiorna stato disponibilita [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          fi
